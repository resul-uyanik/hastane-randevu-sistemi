<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRS - Hasta Yönetimi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🏥 HRS Otomasyonu</a>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Ana Sayfa</a></li>
        <li class="nav-item"><a class="nav-link" href="/view/doctors">Doktor Yönetimi</a></li>
        <li class="nav-item"><a class="nav-link active" href="/view/patients">Hasta Kayıt</a></li>
        <li class="nav-item"><a class="nav-link" href="/view/appointments">Randevular</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="row">
    <div class="col-md-4 mb-4">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom fw-bold text-success">
          ➕ Yeni Hasta Kayıt
        </div>
        <div class="card-body">
          <form id="patientForm">
            <div class="mb-3">
              <label for="identityNumber" class="form-label small fw-bold">T.C. Kimlik No</label>
              <input type="text" class="form-control" id="identityNumber" maxlength="11" placeholder="11 Haneli TC Kimlik No" required>
            </div>
            <div class="mb-3">
              <label for="firstName" class="form-label small fw-bold">Hasta Adı</label>
              <input type="text" class="form-control" id="firstName" placeholder="Hasta adını giriniz" required>
            </div>
            <div class="mb-3">
              <label for="lastName" class="form-label small fw-bold">Hasta Soyadı</label>
              <input type="text" class="form-control" id="lastName" placeholder="Hasta soyadını giriniz" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Kaydet</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm border-0 mb-3">
        <div class="card-body py-2">
          <div class="input-group">
            <input type="text" id="searchInput" class="form-control" placeholder="İsime veya soyisime göre hasta ara...">
            <button class="btn btn-primary" onclick="searchPatients()">🔍 Ara</button>
            <button class="btn btn-outline-secondary" onclick="clearSearch()">Temizle</button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom fw-bold text-dark d-flex justify-content-between align-items-center">
          <span>👥 Sistemde Kayıtlı Hastalar</span>
          <button class="btn btn-sm btn-outline-secondary" onclick="loadPatients()">🔄 Yenile</button>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
              <tr>
                <th class="ps-3" style="width: 10%">ID</th>
                <th style="width: 30%">T.C. Kimlik No</th>
                <th style="width: 45%">Adı Soyadı</th>
                <th class="text-end pe-3" style="width: 15%">İşlemler</th>
              </tr>
              </thead>
              <tbody id="patientTableBody">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
      loadPatients();
  });

  function loadPatients() {
      fetch('/patients')
          .then(response => response.json())
          .then(patients => {
              renderTable(patients);
          })
          .catch(error => console.error('Hastalar yüklenirken hata:', error));
  }

  function renderTable(patients) {
      const tbody = document.getElementById('patientTableBody');
      tbody.innerHTML = '';

      if (patients.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">Kayıtlı hasta bulunamadı.</td></tr>`;
          return;
      }

      patients.forEach(patient => {
          const row = `
              <tr>
                  <td class="ps-3 fw-bold">${patient.id}</td>
                  <td><code>${patient.identityNumber}</code></td>
                  <td>${patient.firstName} ${patient.lastName}</td>
                  <td class="text-end pe-3">
                      <button class="btn btn-sm btn-danger" onclick="deletePatient(${patient.id})">Sil</button>
                  </td>
              </tr>
          `;
          tbody.innerHTML += row;
      });
  }

  document.getElementById('patientForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const identityNumber = document.getElementById('identityNumber').value;
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;

      const patientData = {
          identityNumber: identityNumber,
          firstName: firstName,
          lastName: lastName
      };

      fetch('/patients', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patientData)
      })
      .then(response => {
          if (response.ok) {
              alert('Hasta başarıyla kayıt edildi');
              document.getElementById('patientForm').reset();
              loadPatients();
          } else {
              return response.json().then(err => {
                  if (err.messages) {
                      alert('Validasyon Hatası:\n' + Object.values(err.messages).join('\n'));
                  } else if (err.message) {
                      alert('Hata: ' + err.message);
                  } else {
                      alert('Kayıt sırasında bir hata oluştu.');
                  }
              });
          }
      })
      .catch(error => console.error('Ekleme hatası:', error));
  });

  // 3. HASTA SİLME FONKSİYONU
  function deletePatient(id) {
      if (confirm('Bu hastayı sistemden silmek istediğine emin misin ?')) {
          fetch(`/patients/${id}`, {
              method: 'DELETE'
          })
          .then(response => {
              if (response.ok) {
                  alert('Hasta kaydı başarıyla silindi.');
                  loadPatients();
              } else {
                  alert('Hasta kaydı silinemedi.');
              }
          })
          .catch(error => console.error('Silme hatası:', error));
      }
  }

  function searchPatients() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) {
          loadPatients();
          return;
      }

      fetch(`/patients/search?name=${encodeURIComponent(query)}`)
          .then(response => response.json())
          .then(patients => {
              renderTable(patients);
          })
          .catch(error => console.error('Arama hatası:', error));
  }


  function clearSearch() {
      document.getElementById('searchInput').value = '';
      loadPatients();
  }
</script>
</body>
</html>
