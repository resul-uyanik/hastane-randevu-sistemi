<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRS - Randevu Yönetimi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🏥 HRS Otomasyonu</a>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Ana Sayfa</a></li>
        <li class="nav-item"><a class="nav-link" href="/view/doctors">Doktor Yönetimi</a></li>
        <li class="nav-item"><a class="nav-link" href="/view/patients">Hasta Kayıt</a></li>
        <li class="nav-item"><a class="nav-link active" href="/view/appointments">Randevular</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="row">
    <div class="col-md-4 mb-4">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom fw-bold text-warning border-start border-warning border-3">
          📅 Yeni Randevu Al
        </div>
        <div class="card-body">
          <form id="appointmentForm">
            <div class="mb-3">
              <label for="doctorSelect" class="form-label small fw-bold">Doktor Seçimi</label>
              <select class="form-select" id="doctorSelect" required>
                <option value="">-- Doktor Seçiniz --</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="patientSelect" class="form-label small fw-bold">Hasta Seçimi</label>
              <select class="form-select" id="patientSelect" required>
                <option value="">-- Hasta Seçiniz --</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="appointmentDate" class="form-label small fw-bold">Randevu Tarihi ve Saati</label>
              <input type="datetime-local" class="form-control" id="appointmentDate" required>
            </div>
            <button type="submit" class="btn btn-warning text-dark fw-bold w-100">Randevuyu Onayla</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm border-0 mb-3">
        <div class="card-body py-2 d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div class="d-flex align-items-center gap-2">
            <label for="filterDate" class="small fw-bold text-nowrap mb-0">Tarihe Göre Filtrele:</label>
            <input type="date" id="filterDate" class="form-control form-control-sm">
            <button class="btn btn-sm btn-primary" onclick="filterAppointmentsByDate()">Filtrele</button>
          </div>
          <button class="btn btn-sm btn-outline-secondary" onclick="loadAllAppointments()">Hepsini Göster / Yenile</button>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom fw-bold text-dark">
          📋 Güncel Randevu Listesi
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
              <tr>
                <th class="ps-3">Tarih / Saat</th>
                <th>👨‍⚕️ Doktor (Uzmanlık)</th>
                <th>👥 Hasta</th>
                <th>Durum</th>
                <th class="text-end pe-3">İşlemler</th>
              </tr>
              </thead>
              <tbody id="appointmentTableBody">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

  document.addEventListener("DOMContentLoaded", function() {
      loadDoctorsToSelect();
      loadPatientsToSelect();
      loadAllAppointments();
  });

  function loadDoctorsToSelect() {
      fetch('/doctors')
          .then(response => response.json())
          .then(doctors => {
              const select = document.getElementById('doctorSelect');
              doctors.forEach(doctor => {
                  const option = document.createElement('option');
                  option.value = doctor.id;
                  option.textContent = `${doctor.name} (${doctor.specialty})`;
                  select.appendChild(option);
              });
          });
  }

  function loadPatientsToSelect() {
      fetch('/patients')
          .then(response => response.json())
          .then(patients => {
              const select = document.getElementById('patientSelect');
              patients.forEach(patient => {
                  const option = document.createElement('option');
                  option.value = patient.id;
                  option.textContent = `${patient.firstName} ${patient.lastName} (TC: ${patient.identityNumber})`;
                  select.appendChild(option);
              });
          });
  }

  function loadAllAppointments() {
      fetch('/appointments')
          .then(response => response.json())
          .then(appointments => renderAppointmentTable(appointments));
  }

  function renderAppointmentTable(appointments) {
      const tbody = document.getElementById('appointmentTableBody');
      tbody.innerHTML = '';

      if (appointments.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">Randevu kaydı bulunamadı.</td></tr>`;
          return;
      }

      appointments.forEach(app => {
          const date = new Date(app.appointmentDate);
          const formattedDate = date.toLocaleString('tr-TR', { dateStyle: 'medium', timeStyle: 'short' });

          const statusBadge = app.completed
              ? '<span class="badge bg-success">Tamamlandı</span>'
              : '<span class="badge bg-warning text-dark">Aktif</span>';

          const completeButton = app.completed
              ? ''
              : `<button class="btn btn-sm btn-outline-success me-1" onclick="completeAppointment(${app.id})">Tamamla</button>`;

          const row = `
              <tr>
                  <td class="ps-3 fw-bold">${formattedDate}</td>
                  <td>${app.doctor.name} <small class="text-muted">(${app.doctor.specialty})</small></td>
                  <td>${app.patient.firstName} ${app.patient.lastName}</td>
                  <td>${statusBadge}</td>
                  <td class="text-end pe-3">
                      ${completeButton}
                      <button class="btn btn-sm btn-danger" onclick="deleteAppointment(${app.id})">İptal Et</button>
                  </td>
              </tr>
          `;
          tbody.innerHTML += row;
      });
  }

  document.getElementById('appointmentForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const doctorId = document.getElementById('doctorSelect').value;
      const patientId = document.getElementById('patientSelect').value;
      const appointmentDate = document.getElementById('appointmentDate').value;

      const requestData = {
          doctorId: parseInt(doctorId),
          patientId: parseInt(patientId),
          appointmentDate: appointmentDate
      };

      fetch('/appointments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestData)
      })
      .then(response => {
          if (response.ok) {
              alert('Randevu başarıyla oluşturuldu.');
              document.getElementById('appointmentForm').reset();
              loadAllAppointments();
          } else {
              return response.json().then(err => {
                  alert('Hata: ' + (err.message ? err.message : 'Çakışma veya eksik bilgi tespit edildi!'));
              });
          }
      })
      .catch(error => console.error('Randevu ekleme hatası:', error));
  });

  function completeAppointment(id) {
      fetch(`/appointments/${id}/complete`, {
          method: 'PATCH'
      })
      .then(response => {
          if (response.ok) {
              alert('Randevu tamamlandı olarak işaretlendi.');
              const filterDate = document.getElementById('filterDate').value;
              if(filterDate) filterAppointmentsByDate(); else loadAllAppointments();
          }
      });
  }

  function deleteAppointment(id) {
      if (confirm('Bu randevuyu iptal etmek istediğine emin misin ?')) {
          fetch(`/appointments/${id}`, {
              method: 'DELETE'
          })
          .then(response => {
              if (response.ok) {
                  alert('Randevu iptal edildi.');
                  const filterDate = document.getElementById('filterDate').value;
                  if(filterDate) filterAppointmentsByDate(); else loadAllAppointments();
              }
          });
      }
  }

  function filterAppointmentsByDate() {
      const dateVal = document.getElementById('filterDate').value;
      if (!dateVal) {
          alert('Lütfen bir tarih seçin reis!');
          return;
      }

      fetch(`/appointments/date?date=${dateVal}`)
          .then(response => response.json())
          .then(appointments => renderAppointmentTable(appointments))
          .catch(error => console.error('Filtreleme hatası:', error));
  }
</script>
</body>
</html>
